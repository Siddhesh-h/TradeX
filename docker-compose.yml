services:
  backend:
    build:
      context: ./backend
    container_name: tradex-backend-container
    env_file:
      - ./backend/.env
    ports:
      - "3002:3002"
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_API_URL: http://127.0.0.1:3002/api
        VITE_LANDING_LOGIN_URL: http://127.0.0.1:5174/login
    container_name: tradex-dashboard-container
    ports:
      - "5173:80"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://127.0.0.1:3002/api
        VITE_DASHBOARD_URL: http://127.0.0.1:5173
    container_name: tradex-frontend-container
    ports:
      - "5174:80"
    restart: unless-stopped